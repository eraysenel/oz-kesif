<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Öz Keşif — Kariyer & Potansiyel Eşleştirme</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&family=Inter:wght@300;400;500;600;700&display=swap');
  :root{
    --bg:#15120f;--bg2:#1c1814;--card:#1f1a15;--line:#332a20;--line2:#4a3c2c;
    --ink:#f2ebe1;--muted:#a89a89;--dim:#776c5e;
    --amber:#c77b3f;--amber-soft:rgba(199,123,63,.14);--green:#7fb88f;--red:#d97a6c;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--ink);line-height:1.6;min-height:100dvh;
       background-image:radial-gradient(circle at 18% 8%,rgba(199,123,63,.07),transparent 42%),radial-gradient(circle at 85% 92%,rgba(199,123,63,.05),transparent 42%)}
  .wrap{max-width:640px;margin:0 auto;padding:0 20px 70px}
  header{display:flex;align-items:center;padding:20px 0 14px}
  .brand{font-family:'Playfair Display',serif;font-size:17px;letter-spacing:2px;color:var(--amber)}
  .ptrack{height:3px;background:var(--line);border-radius:2px;margin-bottom:26px;overflow:hidden}
  .pfill{height:100%;background:var(--amber);border-radius:2px;width:0%;transition:width .4s ease}
  .eyebrow{color:var(--amber);font-size:11.5px;letter-spacing:2.5px;font-weight:600;text-transform:uppercase}
  h1.intro-title{font-family:'Playfair Display',serif;font-size:30px;line-height:1.32;font-weight:400;margin:16px 0 16px}
  h1.intro-title em{font-style:italic;color:var(--amber)}
  .intro-body{color:var(--muted);font-size:15px;line-height:1.7;margin-bottom:26px;max-width:520px}
  .btn{border:1px solid var(--line2);background:var(--card);color:var(--ink);border-radius:9px;padding:12px 22px;font-size:14.5px;font-weight:600;cursor:pointer;font-family:inherit;transition:.15s}
  .btn:hover{border-color:var(--amber)}
  .btn.primary{background:var(--amber);border-color:var(--amber);color:#1a0f05}
  .btn.primary:hover{filter:brightness(1.08)}
  .btn:disabled{opacity:.45;cursor:wait}
  .note{margin-top:14px;font-size:12.5px;color:var(--dim)}
  .card{background:var(--card);border:1px solid var(--line);border-radius:13px;padding:24px}
  .q-text{font-size:17px;line-height:1.65;margin-bottom:22px}
  .opt-list{display:flex;flex-direction:column;gap:9px}
  .opt-btn{text-align:left;background:transparent;border:1px solid var(--line2);color:var(--ink);padding:13px 16px;border-radius:8px;cursor:pointer;font-size:14.5px;font-family:inherit;transition:.15s}
  .opt-btn:hover{border-color:var(--amber);background:var(--amber-soft)}
  .opt-btn:disabled{opacity:.5;cursor:wait}
  .spinner{display:flex;align-items:center;gap:10px;color:var(--muted);padding:20px 0;font-size:13.5px}
  .sdot{width:7px;height:7px;border-radius:50%;background:var(--amber);animation:pul 1.1s infinite ease-in-out}
  @keyframes pul{0%,100%{opacity:.3;transform:scale(.8)}50%{opacity:1;transform:scale(1.15)}}
  .err{background:rgba(217,122,108,.1);border:1px solid var(--red);color:#f0bdb4;border-radius:9px;padding:12px 14px;font-size:13.5px;margin-bottom:16px}
  .err button{margin-top:8px}
  .report{background:var(--card);border:1px solid var(--line);border-radius:13px;padding:30px 26px;font-size:14.5px}
  .report h2{font-family:'Playfair Display',serif;color:var(--amber);font-size:21px;font-weight:500;margin:26px 0 12px}
  .report h2:first-child{margin-top:0}
  .report p{color:var(--muted);line-height:1.75;margin:6px 0}
  .report li{color:var(--muted);line-height:1.75;margin:5px 0 5px 20px}
  .report strong{color:var(--ink)}
  .restart-row{margin-top:24px;display:flex;gap:10px;flex-wrap:wrap}
  .footer{color:var(--dim);font-size:11.5px;text-align:center;padding:34px 0 4px}
  .footer a{color:var(--amber)}
</style>
</head>
<body>
<div class="wrap">
  <header><div class="brand">ÖZ KEŞİF</div></header>
  <div class="ptrack"><div class="pfill" id="pfill"></div></div>

  <main id="main"></main>

  <div class="footer">Ücretsiz · açık · veriler bu cihazda · <a href="https://eraysenel.github.io/iyilik-icin-ai/" target="_blank" rel="noopener">İyilik İçin Yapay Zeka</a> · © Eray Şenel</div>
</div>

<div id="ts-wrap" style="position:fixed;bottom:14px;left:14px;z-index:99;display:none">
  <div style="background:#1f1a15;border:1px solid #4a3c2c;border-radius:10px;padding:9px;box-shadow:0 6px 22px rgba(0,0,0,.45)">
    <div style="font-size:11px;color:#a89a89;margin-bottom:6px">İnsan olduğunu onayla:</div>
    <div id="ts-box"></div>
  </div>
</div>
<script src="https://challenges.cloudflare.com/turnstile/v0/api.js?render=explicit&onload=cfTsOnload" async defer></script>

<script>
/* ================= Proxy + Turnstile (paylaşılan altyapı) ================= */
const PROXY="https://iyilikicinai.doksandokuz3032.workers.dev/";
const SITEKEY="0x4AAAAAADsB1yi04fQ4PyVU";
let _ses=null;try{_ses=JSON.parse(localStorage.getItem('cf_ses')||'null');}catch(e){}
let _tsWid=null,_tsTok='',_tsW=null;
function _tsShow(b){var e=document.getElementById('ts-wrap');if(e)e.style.display=b?'block':'none';}
function _sesOk(){return _ses&&_ses.token&&_ses.exp&&Date.now()<_ses.exp-60000;}
window.cfTsOnload=function(){try{_tsWid=turnstile.render('#ts-box',{sitekey:SITEKEY,size:'compact',callback:function(t){_tsTok=t;if(_tsW){_tsW(t);_tsW=null;}_tsShow(false);},'error-callback':function(){if(_tsW){_tsW('');_tsW=null;}}});}catch(e){}};
function _tsToken(){return new Promise(function(res){
  if(typeof turnstile==='undefined'||_tsWid===null){res('');return;}
  if(_tsTok){var t=_tsTok;_tsTok='';res(t);return;}
  _tsW=res;_tsShow(true);try{turnstile.reset(_tsWid);}catch(e){}
  setTimeout(function(){if(_tsW===res){_tsW=null;res('');}},15000);
});}
async function ensureSession(){
  if(_sesOk())return _ses.token;
  var tt=await _tsToken();
  if(!tt)throw new Error('Doğrulama tamamlanamadı. Sol alttaki kutuyu işaretleyip tekrar dene.');
  var r=await fetch(PROXY,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'auth',turnstileToken:tt})});
  var d=await r.json();
  if(!d.sessionToken)throw new Error((d.error||'oturum alınamadı')+(d.codes&&d.codes.length?(' ['+d.codes.join(', ')+']'):''));
  _ses={token:d.sessionToken,exp:d.exp};try{localStorage.setItem('cf_ses',JSON.stringify(_ses));}catch(e){}
  _tsShow(false);return _ses.token;
}
/* Not: Turnstile ilk gerçek AI çağrısında (Başla'ya basınca) tetiklenir; sayfa
   yüklenir yüklenmez ön-doğrulama yapılmaz - gereksiz erken kutu çıkmasın diye. */

async function ai(messages,wantJson,temp){
  async function go(t){return fetch(PROXY,{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify(Object.assign({messages:messages,temperature:temp==null?0.85:temp,sessionToken:t},wantJson?{response_format:{type:'json_object'}}:{}))});}
  var st=await ensureSession();var r=await Promise.race([go(st),new Promise(function(_,rej){setTimeout(function(){rej(new Error('Zaman aşımı, tekrar dene.'))},25000)})]);
  if(r.status===401){_ses=null;localStorage.removeItem('cf_ses');st=await ensureSession();r=await go(st);}
  var d=await r.json();if(d.error)throw new Error(d.error.message||JSON.stringify(d.error));
  var txt=(d.choices&&d.choices[0]&&d.choices[0].message.content||'').trim();
  if(!wantJson)return txt;
  var clean=txt.replace(/^```json|```$/g,'').trim();
  try{return JSON.parse(clean);}catch(e){throw new Error('Yanıt ayrıştırılamadı, tekrar dene.');}
}
function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

/* ================= Sistem promptları ================= */
const TURKISH_QUALITY_NOTE=`Yazdığın Türkçe metin dilbilgisi ve yazım kurallarına tam uygun, akıcı ve doğal olmalı; özne-yüklem uyumsuzluğu, eksik/yanlış ek, imla hatası veya anlatım bozukluğu OLMAMALI. Yanıtı vermeden önce kendi cümlelerini sessizce gözden geçir ve varsa hataları düzelt.`;
const SYS={
  career:`Sen bir kariyer ve meslek eşleştirme uzmanısın. Dünyada binlerce farklı meslek/kariyer yönü var; kullanıcının cevaplarına göre bunlar arasından gerçekten ona uygun olanları buluyorsun - BEKLENMEDİK eşleşmelerden çekinme (ör. yapay zeka kariyeri düşünen biri kanıtlara göre aslında veterinerliğe ya da görsel sanatlara çok daha yatkın çıkabilir; bu tür sürpriz ama mantıklı sonuçlar değerlidir, bastırma). KURALLAR: (1) SADECE çoktan seçmeli sorular sor, asla serbest yazım isteme. (2) Sorular BASİT, SOMUT, GÜNLÜK ve HIZLI cevaplanabilir olmalı - asla ağır, varoluşsal, "seni ne durduruyor", "neden hep şuna yöneliyorsun" tarzı yorucu/boğucu sorular sorma. İyi soru örneği: "Hafta sonun boş, ne yaparsın? A) Yeni bir konu hakkında okuma/izleme yaparım B) Arkadaşlarla buluşurum C) Elimle bir şey yapar/onarırım D) Tek başıma doğada vakit geçiririm" - somut, gerçek hayattan, eğlenceli. (3) Sana önceki cevap geçmişi ve mevcut aday meslek listesi verilecek (boş olabilir, ilk soru ise). Her seferinde: aday listesini güncelle (en iyi eşleşenden başlayarak 4-6 aday tut; zayıf adayları çıkar, güçlü/sürpriz yeni adayları ekle, her adaya kısa bir gerekçe yaz), sonra şu anki en güçlü adaylar arasında EN ÇOK AYRIM yaratacak somut bir sonraki soru üret. (4) En güçlü 1-2 aday net şekilde öne çıktıysa converged:true işaretle (bu durumda question null, options boş dizi olur). ${TURKISH_QUALITY_NOTE} SADECE JSON: {"candidates":[{"name":string,"why":string kısa gerekçe}],"question":string veya null,"options":[string,string,string] (3-5 kısa seçenek; converged:true ise []),"converged":boolean}`,
  final:`Kullanıcının verdiği tüm cevapları ve son aday meslek/kariyer listesini inceleyerek nihai bir rapor yaz. Amaç kişiliği etiketlemek değil, somut bir kariyer/meslek yönü göstermek. BEKLENMEDİK ama kanıta dayalı eşleşmelerden çekinme, gerekirse kullanıcının başta düşündüğünden farklı bir yön öner. Türkçe, samimi, markdown formatında yaz. Bölümler: "## En Uygun Yönlerin" (en iyi 2-3 meslek/kariyer yönü; her biri için, hangi cevaplara dayandığını belirten kısa bir gerekçe), "## İlk Adım" (her aday için, o yönü gerçekten test etmek için bu hafta başlanabilecek TEK somut, küçük bir eylem - jenerik tavsiye değil, gerçekten yapılabilir bir şey). ASLA sayısal puan/yüzde uydurma (ör. "%87 uyum") - sadece sıralama ve nitel gerekçe kullan. Kullanıcıya doğrudan "sen" diye hitap et. ${TURKISH_QUALITY_NOTE} SADECE markdown metin döndür, JSON değil, kod bloğu işareti kullanma.`
};

/* ================= Durum ================= */
const STAGE={INTRO:'intro',QUIZ:'quiz',SYNTH:'synth',DONE:'done'};
const Q_MIN=6,Q_MAX=10;

function freshState(){return {stage:STAGE.QUIZ,history:[],candidates:[],curQ:null,curPreCandidates:[],report:'',busy:false,error:null};}
function loadState(){try{var s=JSON.parse(localStorage.getItem('ok_state')||'null');if(s&&s.stage)return s;}catch(e){}return null;}
function saveState(){try{localStorage.setItem('ok_state',JSON.stringify({stage:ST.stage,history:ST.history,candidates:ST.candidates,curQ:ST.curQ,curPreCandidates:ST.curPreCandidates,report:ST.report}));}catch(e){}}
function clearState(){try{localStorage.removeItem('ok_state');}catch(e){}}

var ST={stage:STAGE.INTRO,history:[],candidates:[],curQ:null,curPreCandidates:[],report:'',busy:false,error:null};

function compactHistory(){return ST.history.map(function(h){return {q:h.question,a:h.chosenLabel};});}

/* ================= Akış mantığı ================= */
function startFlow(){clearState();ST=freshState();render();advance();}
function resumeFlow(){
  var saved=loadState();if(!saved){startFlow();return;}
  ST.stage=saved.stage;ST.history=saved.history||[];ST.candidates=saved.candidates||[];
  ST.curQ=saved.curQ||null;ST.curPreCandidates=saved.curPreCandidates||[];ST.report=saved.report||'';
  render();
  if((ST.stage===STAGE.QUIZ&&!ST.curQ)||ST.stage===STAGE.SYNTH)advance();
}
function restart(){clearState();ST={stage:STAGE.INTRO,history:[],candidates:[],curQ:null,curPreCandidates:[],report:'',busy:false,error:null};render();}

async function advance(){
  ST.error=null;
  if(ST.stage===STAGE.QUIZ){if(!ST.curQ)await fetchNextQuestion();return;}
  if(ST.stage===STAGE.SYNTH){await fetchFinalReport();return;}
}

async function fetchNextQuestion(){
  setBusy(true);render();
  try{
    var preCands=ST.candidates;
    var payload={candidates:preCands,history:compactHistory(),n:ST.history.length};
    var r=await ai([{role:'system',content:SYS.career},{role:'user',content:JSON.stringify(payload)}],true,0.8);
    if(r&&r.candidates)ST.candidates=r.candidates;
    var converged=r&&r.converged;
    if((ST.history.length>=Q_MIN&&converged)||ST.history.length>=Q_MAX){
      ST.stage=STAGE.SYNTH;ST.curQ=null;saveState();render();advance();return;
    }
    ST.curQ={question:(r&&r.question)||'',options:(r&&r.options&&r.options.length?r.options:['Evet','Hayır'])};
    ST.curPreCandidates=preCands;
  }catch(e){ST.error=e.message;}
  setBusy(false);saveState();render();
}
function answerQuestion(idx){
  if(!ST.curQ||ST.busy)return;
  var label=ST.curQ.options[idx];
  ST.history.push({question:ST.curQ.question,options:ST.curQ.options,chosenIndex:idx,chosenLabel:label,preCandidates:ST.curPreCandidates});
  ST.curQ=null;
  saveState();render();
  advance();
}
function goBack(){
  if(!ST.history.length||ST.busy)return;
  var last=ST.history.pop();
  ST.candidates=last.preCandidates||[];
  ST.curQ={question:last.question,options:last.options};
  ST.curPreCandidates=last.preCandidates||[];
  ST.error=null;
  saveState();render();
}

async function fetchFinalReport(){
  setBusy(true);render();
  try{
    var txt=await ai([{role:'system',content:SYS.final},{role:'user',content:'Cevap geçmişi: '+JSON.stringify(compactHistory())+'\nAday meslekler: '+JSON.stringify(ST.candidates)}],false,0.55);
    ST.report=txt;ST.stage=STAGE.DONE;
  }catch(e){ST.error=e.message;}
  setBusy(false);saveState();render();
}
function setBusy(b){ST.busy=b;}

/* ================= Render ================= */
function render(){
  updateProgress();
  var m=document.getElementById('main');
  if(ST.stage===STAGE.INTRO)return m.innerHTML=tplIntro();
  if(ST.stage===STAGE.QUIZ)return m.innerHTML=tplShell(tplQuiz());
  if(ST.stage===STAGE.SYNTH)return m.innerHTML=tplShell(ST.error?'':'<div class="spinner"><span class="sdot"></span>sonuçların hazırlanıyor…</div>');
  if(ST.stage===STAGE.DONE)return m.innerHTML=tplReport();
}
function updateProgress(){
  var pct=0;
  if(ST.stage===STAGE.QUIZ)pct=10+Math.min(1,ST.history.length/Q_MAX)*75;
  else if(ST.stage===STAGE.SYNTH)pct=92;
  else if(ST.stage===STAGE.DONE)pct=100;
  var el=document.getElementById('pfill');if(el)el.style.width=Math.round(pct)+'%';
}
function tplIntro(){
  var saved=loadState();
  var resumeBtn='';
  if(saved&&saved.stage&&saved.stage!==STAGE.INTRO){
    resumeBtn=saved.stage===STAGE.DONE
      ? '<button class="btn" onclick="resumeFlow()" style="margin-left:8px">Son sonucunu gör</button>'
      : '<button class="btn" onclick="resumeFlow()" style="margin-left:8px">↻ Kaldığın yerden devam et</button>';
  }
  return '<div class="intro"><div class="eyebrow">KARİYER & POTANSİYEL EŞLEŞTİRME</div>'
    +'<h1 class="intro-title">Binlerce yön arasından,<br><em>sana en yakın olanı</em> bul.</h1>'
    +'<p class="intro-body">Hızlı, çoktan seçmeli birkaç soru - hiçbiri yazmanı istemez. Cevapladıkça aday meslek/kariyer yönleri daralır; bazen hiç beklemediğin bir yöne çıkabilirsin, bu normal ve değerlidir. Sonunda sana en uygun 2-3 somut yön ve ilk adımları çıkar.</p>'
    +'<button class="btn primary" onclick="startFlow()">'+(saved&&saved.stage&&saved.stage!==STAGE.INTRO?'Yeniden başla':'Başla')+'</button>'+resumeBtn
    +'<div class="note">~5 dakika · tamamı çoktan seçmeli · istediğin an önceki cevabını değiştirebilirsin</div></div>';
}
function tplShell(inner){
  return (ST.error?'<div class="err">⚠️ '+esc(ST.error)+'<div><button class="btn" onclick="retryCurrent()">Tekrar dene</button></div></div>':'')+inner;
}
function tplQuiz(){
  if(ST.busy&&!ST.curQ)return '<div class="spinner"><span class="sdot"></span>düşünülüyor…</div>';
  if(!ST.curQ)return '';
  var backBtn=ST.history.length>0?'<button class="btn" style="margin-bottom:14px" '+(ST.busy?'disabled':'')+' onclick="goBack()">← Önceki cevaba dön</button>':'';
  var h=backBtn+'<div class="card"><p class="q-text">'+esc(ST.curQ.question)+'</p><div class="opt-list">';
  h+=ST.curQ.options.map(function(o,i){
    return '<button class="opt-btn" '+(ST.busy?'disabled':'')+' onclick="answerQuestion('+i+')">'+esc(o)+'</button>';
  }).join('');
  h+='</div></div>';
  return h;
}
function mdToHtml(md){
  var lines=(md||'').split('\n'),h='',inList=false;
  lines.forEach(function(line){
    var l=line.trim();
    if(/^##\s+/.test(l)){if(inList){h+='</ul>';inList=false;}h+='<h2>'+esc(l.replace(/^##\s+/,''))+'</h2>';return;}
    if(/^#\s+/.test(l)){if(inList){h+='</ul>';inList=false;}h+='<h2>'+esc(l.replace(/^#\s+/,''))+'</h2>';return;}
    if(/^-\s+/.test(l)){if(!inList){h+='<ul>';inList=true;}h+='<li>'+esc(l.replace(/^-\s+/,''))+'</li>';return;}
    if(l===''){if(inList){h+='</ul>';inList=false;}return;}
    if(inList){h+='</ul>';inList=false;}
    var bolded=esc(l).replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
    h+='<p>'+bolded+'</p>';
  });
  if(inList)h+='</ul>';
  return h;
}
function tplReport(){
  return '<div class="eyebrow">SONUÇ</div><div class="report">'+mdToHtml(ST.report)+'</div>'
    +'<div class="restart-row"><button class="btn" onclick="restart()">↺ Baştan başla</button></div>';
}
function retryCurrent(){ST.error=null;render();advance();}

/* Sayfa her zaman giriş ekranıyla açılır - kayıtlı ilerleme varsa orada ayrı bir
   "kaldığın yerden devam et" düğmesiyle sunulur, otomatik atlama yapılmaz. */
render();
</script>
</body>
</html>
