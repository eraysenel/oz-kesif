<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Öz Keşif — Kişilik & Yetenek Analizi</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&family=Inter:wght@300;400;500;600;700&display=swap');
  :root{
    --bg:#15120f;--bg2:#1c1814;--card:#1f1a15;--line:#332a20;--line2:#4a3c2c;
    --ink:#f2ebe1;--muted:#a89a89;--dim:#776c5e;
    --amber:#c77b3f;--amber-soft:rgba(199,123,63,.14);--green:#7fb88f;--red:#d97a6c;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--ink);line-height:1.6;min-height:100dvh;
       background-image:radial-gradient(circle at 18% 8%,rgba(199,123,63,.07),transparent 42%),radial-gradient(circle at 85% 92%,rgba(199,123,63,.05),transparent 42%)}
  .wrap{max-width:680px;margin:0 auto;padding:0 20px 70px}
  header{display:flex;justify-content:space-between;align-items:center;padding:22px 0;border-bottom:1px solid var(--line);margin-bottom:8px;position:sticky;top:0;background:var(--bg);z-index:5}
  .brand{font-family:'Playfair Display',serif;font-size:18px;letter-spacing:2px;color:var(--amber)}
  .dots{display:flex;gap:6px}
  .dot{width:20px;height:3px;border-radius:2px;background:var(--line2);transition:.3s}
  .dot.on{background:var(--amber)}
  .eyebrow{color:var(--amber);font-size:11.5px;letter-spacing:2.5px;font-weight:600;text-transform:uppercase}
  h1.intro-title{font-family:'Playfair Display',serif;font-size:32px;line-height:1.3;font-weight:400;margin:18px 0 20px}
  h1.intro-title em{font-style:italic;color:var(--amber)}
  h2.layer-title{font-family:'Playfair Display',serif;font-size:25px;font-weight:400;margin:8px 0 22px}
  .intro-body{color:var(--muted);font-size:15.5px;line-height:1.75;margin-bottom:30px;max-width:560px}
  .intro ul{margin:0 0 30px;padding-left:0;list-style:none}
  .intro li{display:flex;gap:10px;color:var(--muted);font-size:14px;margin:9px 0}
  .intro li b{color:var(--ink);font-weight:600}
  .btn{border:1px solid var(--line2);background:var(--card);color:var(--ink);border-radius:9px;padding:12px 22px;font-size:14.5px;font-weight:600;cursor:pointer;font-family:inherit;transition:.15s}
  .btn:hover{border-color:var(--amber)}
  .btn.primary{background:var(--amber);border-color:var(--amber);color:#1a0f05}
  .btn.primary:hover{filter:brightness(1.08)}
  .btn:disabled{opacity:.45;cursor:wait}
  .note{margin-top:14px;font-size:12.5px;color:var(--dim)}
  .card{background:var(--card);border:1px solid var(--line);border-radius:13px;padding:24px}
  .q-text{font-size:17px;line-height:1.65;margin-bottom:22px}
  .opt-list{display:flex;flex-direction:column;gap:9px}
  .opt-btn{text-align:left;background:transparent;border:1px solid var(--line2);color:var(--ink);padding:13px 16px;border-radius:8px;cursor:pointer;font-size:14.5px;font-family:inherit;transition:.15s}
  .opt-btn:hover{border-color:var(--amber);background:var(--amber-soft)}
  .opt-btn:disabled{opacity:.5;cursor:wait}
  textarea{width:100%;background:var(--bg2);border:1px solid var(--line2);border-radius:8px;color:var(--ink);padding:13px;font-size:14.5px;font-family:inherit;resize:vertical;min-height:90px;outline:none;margin-bottom:14px}
  textarea:focus{border-color:var(--amber)}
  .task-title{font-size:18px;font-weight:600;margin-bottom:8px}
  .task-desc{color:var(--muted);line-height:1.65;margin-bottom:18px;font-size:14.5px}
  .conf-wrap{margin-top:32px}
  .conf-lab{font-size:11px;color:var(--dim);letter-spacing:.6px;text-transform:uppercase;margin-bottom:10px;font-weight:600}
  .conf-row{margin-bottom:9px}
  .conf-row .rh{display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin-bottom:4px}
  .conf-bar{height:4px;background:var(--line);border-radius:2px;overflow:hidden}
  .conf-bar>i{display:block;height:100%;background:var(--amber);transition:width .5s}
  .progn{font-size:12.5px;color:var(--dim);margin-bottom:14px}
  .spinner{display:flex;align-items:center;gap:10px;color:var(--muted);padding:20px 0;font-size:13.5px}
  .sdot{width:7px;height:7px;border-radius:50%;background:var(--amber);animation:pul 1.1s infinite ease-in-out}
  @keyframes pul{0%,100%{opacity:.3;transform:scale(.8)}50%{opacity:1;transform:scale(1.15)}}
  .err{background:rgba(217,122,108,.1);border:1px solid var(--red);color:#f0bdb4;border-radius:9px;padding:12px 14px;font-size:13.5px;margin-bottom:16px}
  .err button{margin-top:8px}
  .qidx{color:var(--amber);font-size:12.5px;font-weight:700;margin-bottom:10px;letter-spacing:.4px}
  .report{background:var(--card);border:1px solid var(--line);border-radius:13px;padding:30px 26px;font-size:14.5px}
  .report h2{font-family:'Playfair Display',serif;color:var(--amber);font-size:21px;font-weight:500;margin:26px 0 12px}
  .report h2:first-child{margin-top:0}
  .report h3{color:var(--ink);font-size:16px;margin:18px 0 8px;font-weight:600}
  .report p{color:var(--muted);line-height:1.75;margin:6px 0}
  .report li{color:var(--muted);line-height:1.75;margin:5px 0 5px 20px}
  .report strong{color:var(--ink)}
  .restart-row{margin-top:24px;display:flex;gap:10px;flex-wrap:wrap}
  .footer{color:var(--dim);font-size:11.5px;text-align:center;padding:34px 0 4px}
  .footer a{color:var(--amber)}
  code{background:var(--bg2);border:1px solid var(--line);border-radius:5px;padding:1px 6px;font-size:12px}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand">ÖZ KEŞİF</div>
    <div class="dots" id="dots"></div>
  </header>

  <main id="main"></main>

  <div class="footer">Ücretsiz · açık · veriler bu cihazda · <a href="https://eraysenel.github.io/iyilik-icin-ai/" target="_blank" rel="noopener">İyilik İçin Yapay Zeka</a> · © Eray Şenel</div>
</div>

<div id="ts-box" style="position:fixed;bottom:10px;left:10px;z-index:99"></div>
<script src="https://challenges.cloudflare.com/turnstile/v0/api.js?render=explicit&onload=cfTsOnload" async defer></script>

<script>
/* ================= Proxy + Turnstile (paylaşılan altyapı) ================= */
const PROXY="https://iyilikicinai.doksandokuz3032.workers.dev/";
const SITEKEY="0x4AAAAAADsB1yi04fQ4PyVU";
let _ses=null;try{_ses=JSON.parse(localStorage.getItem('cf_ses')||'null');}catch(e){}
let _tsWid=null,_tsTok='',_tsW=null;
function _tsShow(b){var e=document.getElementById('ts-box');if(e)e.style.display=b?'block':'none';}
function _sesOk(){return _ses&&_ses.token&&_ses.exp&&Date.now()<_ses.exp-60000;}
window.cfTsOnload=function(){try{_tsWid=turnstile.render('#ts-box',{sitekey:SITEKEY,size:'compact',callback:function(t){_tsTok=t;if(_tsW){_tsW(t);_tsW=null;}_tsShow(false);},'error-callback':function(){if(_tsW){_tsW('');_tsW=null;}}});_tsShow(false);}catch(e){}};
function _tsToken(){return new Promise(function(res){
  if(typeof turnstile==='undefined'||_tsWid===null){res('');return;}
  if(_tsTok){var t=_tsTok;_tsTok='';res(t);return;}
  _tsW=res;_tsShow(true);try{turnstile.reset(_tsWid);}catch(e){}
  setTimeout(function(){if(_tsW===res){_tsW=null;res('');}},9000);
});}
async function ensureSession(){
  if(_sesOk())return _ses.token;
  var tt=await _tsToken();
  if(!tt)throw new Error('Doğrulama yüklenemedi. Sayfayı yenile; gerekirse sol alttaki kutuyu işaretle.');
  var r=await fetch(PROXY,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'auth',turnstileToken:tt})});
  var d=await r.json();
  if(!d.sessionToken)throw new Error((d.error||'oturum alınamadı')+(d.codes&&d.codes.length?(' ['+d.codes.join(', ')+']'):''));
  _ses={token:d.sessionToken,exp:d.exp};try{localStorage.setItem('cf_ses',JSON.stringify(_ses));}catch(e){}
  _tsShow(false);return _ses.token;
}
setTimeout(function(){if(!_sesOk()){ensureSession().catch(function(){});}},800);

async function ai(messages,wantJson){
  async function go(t){return fetch(PROXY,{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify(Object.assign({messages:messages,temperature:0.85,sessionToken:t},wantJson?{response_format:{type:'json_object'}}:{}))});}
  var st=await ensureSession();var r=await Promise.race([go(st),new Promise(function(_,rej){setTimeout(function(){rej(new Error('Zaman aşımı, tekrar dene.'))},25000)})]);
  if(r.status===401){_ses=null;localStorage.removeItem('cf_ses');st=await ensureSession();r=await go(st);}
  var d=await r.json();if(d.error)throw new Error(d.error.message||JSON.stringify(d.error));
  var txt=(d.choices&&d.choices[0]&&d.choices[0].message.content||'').trim();
  if(!wantJson)return txt;
  var clean=txt.replace(/^```json|```$/g,'').trim();
  try{return JSON.parse(clean);}catch(e){throw new Error('Yanıt ayrıştırılamadı, tekrar dene.');}
}
function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

/* ================= Sistem promptları ================= */
const DIMENSIONS=["Dışadönüklük","Açıklık","Sorumluluk","Uyumluluk","Duygusal Dengelilik"];
const SYS={
  layer1:`Sen bir kişilik analisti yapay zekasın. Kullanıcıya ASLA doğrudan "nasıl birisin" tarzı sorular sorma. Bunun yerine senaryo bazlı, zorunlu-seçim (forced-choice) veya hikaye tamamlama soruları üret. Amaç: Big Five benzeri 5 boyutu (${DIMENSIONS.join(', ')}) VE kişinin itiraf etmekten çekineceği "gölge" özellikleri (kıskançlık, kontrol ihtiyacı, onay arayışı, risk korkusu, kıyaslama dürtüsü vb.) dolaylı yoldan açığa çıkarmak. Sana mevcut bağlam çekirdeği verilecek; güven skoru düşük olan boyutlara öncelik ver, daha önce sorulan soruları tekrar etme. Sorular somut, kısa, gerçek hayattan, Türkçe olsun. SADECE şu JSON şemasıyla yanıt ver: {"question":string,"type":"scenario|forced_choice|story_completion","options":[string,string] veya [],"targets_dimension":string}. "options" 2-4 kısa seçenek olabilir; bazen (hikaye tamamlama gibi) boş dizi bırakıp serbest yazım iste.`,
  layer1_score:`Kullanıcının cevabını analiz et. Hangi kişilik boyutunu nasıl etkilediğini, güven artışını ve varsa açığa çıkan gölge özelliği belirle. SADECE JSON: {"dimension":string (verilen 5 boyuttan biri),"score_delta":number (-2..2),"confidence_delta":number (5..20),"shadow_trait_found":string veya null,"reasoning":string (kısa, dahili not)}`,
  layer2:`Sen bir yetenek değerlendirme yapay zekasısın. Sana verilen kişilik profiline göre KİŞİSELLEŞTİRİLMİŞ, kısa (2-4 dakikada yapılabilir) bir mikro-görev tasarla: profil soyut/analitik ağırlıklıysa kavramsal bir görev, somut/uygulamalı ağırlıklıysa pratik bir görev ver. Görev "doğru cevap" aramamalı, kullanıcının NASIL yaklaştığını gözlemlemeye yönelik olmalı. Türkçe. SADECE JSON: {"task_title":string,"task_description":string,"observes":string (hangi yetenek/yaklaşım izleniyor)}`,
  layer2_score:`Kullanıcının mikro-göreve verdiği yanıtı, verilen kişilik profiliyle çapraz kontrol et: örtüşüyor mu, çelişiyor mu, yoksa sürpriz bir yetenek mi ortaya çıktı? SADECE JSON: {"skill_observed":string,"matches_personality":true/false,"conflict_note":string veya null,"surprise_skill":string veya null}`,
  layer3:`Sana bir çelişki kaydı verilecek (kişinin kişilik profili ile davranışsal kanıtı arasındaki uyumsuzluk). Bu çelişkiyi çözmeye yönelik, hedefe yönelik ama DOLAYLI bir senaryo sorusu üret (doğrudan "neden çelişiyorsun" deme, asla açıklama isteme). SADECE JSON: {"question":string,"options":[string,string,string]}`,
  layer4:`Bağlam çekirdeği yeterince doygunlaştı. Şimdi kullanıcıya DOĞRUDAN, kendine dönük tam 3 soru sorulacak (ör. "5 yıl sonra kendini nerede görüyorsun?", "hangi hayatı yaşamaktan korkuyorsun?", "hangi başarıyı kendine yakıştıramıyorsun?" tarzı ama bu kişiye özel). Verilen bağlam çekirdeğine bakarak bu kişi için en anlamlı/yüzleştirici 3 soruyu üret — özellikle gölge özellikler ve çelişkilerle ilgili olanları. SADECE JSON: {"questions":[string,string,string]}`,
  layer5:`Tüm bağlam çekirdeğini ve yüzleştirme (doğrudan soru) cevaplarını sentezle. Türkçe, samimi ama net bir dille, markdown formatında kapsamlı bir rapor yaz. Şu 3 bölümü ## başlıklarıyla ayır: "## Doğrulanmış Kalıplar" (yüksek güvenle çıkan yetenek/kişilik kalıpları, hangi kanıttan geldiğini belirterek), "## Kör Noktalar" (kişinin söylediği ile davranışsal kanıtın çeliştiği yerleri AÇIKÇA göster — kullanıcının inkâr ettiği ama kanıtla desteklenen özellikler), "## Yol Haritası" (bu profile özel, jenerik olmayan somut 30/90/365 günlük eylem planı, madde madde). Kullanıcıya doğrudan "sen" diye hitap et. SADECE markdown metin döndür, JSON değil, kod bloğu işareti kullanma.`
};

/* ================= Durum ================= */
const STAGE={INTRO:'intro',L1:'l1',L2:'l2',L3:'l3',L4:'l4',L5:'l5',DONE:'done'};
const STAGE_ORDER=[STAGE.L1,STAGE.L2,STAGE.L3,STAGE.L4,STAGE.L5];
const L1_MIN=6,L1_MAX=11,CONF_THRESHOLD=72;

function freshCore(){
  var dims={};DIMENSIONS.forEach(function(d){dims[d]={score:0,confidence:0};});
  return {dimensions:dims,shadowTraits:[],conflicts:[],skills:[],l1Count:0,askedTopics:[]};
}
function loadState(){try{var s=JSON.parse(sessionStorage.getItem('ok_state')||'null');if(s&&s.core)return s;}catch(e){}return null;}
function saveState(){try{sessionStorage.setItem('ok_state',JSON.stringify({stage:ST.stage,core:ST.core,confrontQ:ST.confrontQ,confrontA:ST.confrontA,confrontIdx:ST.confrontIdx,report:ST.report}));}catch(e){}}
function clearState(){try{sessionStorage.removeItem('ok_state');}catch(e){}}

var ST={stage:STAGE.INTRO,core:freshCore(),curQ:null,curTask:null,confrontQ:[],confrontA:[],confrontIdx:0,report:'',busy:false,error:null};

function minConfidence(){return Math.min.apply(null,DIMENSIONS.map(function(d){return ST.core.dimensions[d].confidence;}));}

/* ================= Akış mantığı ================= */
async function startFlow(){
  var saved=loadState();
  if(saved&&saved.stage!==STAGE.INTRO&&saved.stage!==STAGE.DONE){
    ST.stage=saved.stage;ST.core=saved.core;ST.confrontQ=saved.confrontQ||[];ST.confrontA=saved.confrontA||[];ST.confrontIdx=saved.confrontIdx||0;ST.report=saved.report||'';
    render();
    advance(false);
    return;
  }
  ST.stage=STAGE.L1;ST.core=freshCore();render();
  advance(true);
}
function restart(){clearState();ST={stage:STAGE.INTRO,core:freshCore(),curQ:null,curTask:null,confrontQ:[],confrontA:[],confrontIdx:0,report:'',busy:false,error:null};render();}

async function advance(forceFetch){
  ST.error=null;
  if(ST.stage===STAGE.L1){
    var count=ST.core.l1Count,conf=minConfidence();
    if(count>=L1_MAX||(count>=L1_MIN&&conf>=CONF_THRESHOLD)){ST.stage=STAGE.L2;saveState();render();advance(true);return;}
    if(!ST.curQ||forceFetch===false)await fetchL1Question();
    return;
  }
  if(ST.stage===STAGE.L2){
    if(!ST.curTask)await fetchL2Task();
    return;
  }
  if(ST.stage===STAGE.L3){
    if(ST.core.conflicts.length===0){ST.stage=STAGE.L4;saveState();render();advance(true);return;}
    if(!ST.curQ)await fetchL3Question();
    return;
  }
  if(ST.stage===STAGE.L4){
    if(ST.confrontQ.length===0)await fetchL4Questions();
    return;
  }
  if(ST.stage===STAGE.L5){
    await fetchL5Report();
    return;
  }
}

async function fetchL1Question(){
  setBusy(true);
  try{
    var q=await ai([{role:'system',content:SYS.layer1},{role:'user',content:'Bağlam çekirdeği: '+JSON.stringify(ST.core)}],true);
    ST.curQ=q;
  }catch(e){ST.error=e.message;}
  setBusy(false);render();
}
async function answerL1(answer){
  setBusy(true);
  try{
    var r=await ai([{role:'system',content:SYS.layer1_score},{role:'user',content:'Soru: '+JSON.stringify(ST.curQ)+'\nCevap: '+answer+'\nMevcut bağlam: '+JSON.stringify(ST.core)}],true);
    if(r&&ST.core.dimensions[r.dimension]){
      var d=ST.core.dimensions[r.dimension];
      d.score+=(r.score_delta||0);d.confidence=Math.min(100,d.confidence+(r.confidence_delta||10));
    }
    if(r&&r.shadow_trait_found)ST.core.shadowTraits.push(r.shadow_trait_found);
    ST.core.l1Count++;ST.curQ=null;
  }catch(e){ST.error=e.message;}
  setBusy(false);saveState();render();
  if(!ST.error)advance(true);
}

async function fetchL2Task(){
  setBusy(true);
  try{
    var t=await ai([{role:'system',content:SYS.layer2},{role:'user',content:'Kişilik profili: '+JSON.stringify(ST.core.dimensions)}],true);
    ST.curTask=t;
  }catch(e){ST.error=e.message;}
  setBusy(false);render();
}
async function submitL2(answer){
  setBusy(true);ST.error=null;
  try{
    var r=await ai([{role:'system',content:SYS.layer2_score},{role:'user',content:'Görev: '+JSON.stringify(ST.curTask)+'\nYanıt: '+answer+'\nKişilik profili: '+JSON.stringify(ST.core.dimensions)}],true);
    if(r){
      ST.core.skills.push(r);
      if(r.matches_personality===false&&r.conflict_note)ST.core.conflicts.push(r.conflict_note);
    }
    ST.curTask=null;ST.stage=STAGE.L3;
  }catch(e){ST.error=e.message;}
  setBusy(false);saveState();render();
  if(ST.stage===STAGE.L3)advance(true);
}

async function fetchL3Question(){
  setBusy(true);
  try{
    var q=await ai([{role:'system',content:SYS.layer3},{role:'user',content:'Çelişki: '+ST.core.conflicts[0]}],true);
    ST.curQ=q;
  }catch(e){ST.error=e.message;}
  setBusy(false);render();
}
function resolveL3(answer){
  ST.core.conflicts[0]='[netleştirildi] '+ST.core.conflicts[0]+' → '+answer;
  ST.curQ=null;ST.stage=STAGE.L4;
  saveState();render();advance(true);
}

async function fetchL4Questions(){
  setBusy(true);
  try{
    var r=await ai([{role:'system',content:SYS.layer4},{role:'user',content:'Bağlam çekirdeği: '+JSON.stringify(ST.core)}],true);
    ST.confrontQ=(r&&r.questions)||[];ST.confrontIdx=0;
  }catch(e){ST.error=e.message;}
  setBusy(false);saveState();render();
}
function submitConfront(answer){
  ST.confrontA.push({q:ST.confrontQ[ST.confrontIdx],a:answer});
  if(ST.confrontIdx+1>=ST.confrontQ.length){ST.stage=STAGE.L5;saveState();render();advance(true);}
  else{ST.confrontIdx++;saveState();render();}
}

async function fetchL5Report(){
  setBusy(true);
  try{
    var txt=await ai([{role:'system',content:SYS.layer5},{role:'user',content:'Bağlam çekirdeği: '+JSON.stringify(ST.core)+'\nYüzleştirme cevapları: '+JSON.stringify(ST.confrontA)}],false);
    ST.report=txt;ST.stage=STAGE.DONE;
  }catch(e){ST.error=e.message;}
  setBusy(false);saveState();render();
}
function setBusy(b){ST.busy=b;}

/* ================= Render ================= */
function render(){
  renderDots();
  var m=document.getElementById('main');
  if(ST.stage===STAGE.INTRO)return m.innerHTML=tplIntro();
  if(ST.stage===STAGE.L1)return m.innerHTML=tplLayerShell('Katman 1 — Derinlere İniş','Sezgisel Tepkiler', tplL1());
  if(ST.stage===STAGE.L2)return m.innerHTML=tplLayerShell('Katman 2 — Kanıt','Mikro Görev', tplL2());
  if(ST.stage===STAGE.L3)return m.innerHTML=tplLayerShell('Katman 3 — Çatışan İzler','Netleştirme', tplL3());
  if(ST.stage===STAGE.L4)return m.innerHTML=tplLayerShell('Katman 4 — Yüzleşme','Şimdi Sana Soruyorum', tplL4());
  if(ST.stage===STAGE.L5)return m.innerHTML=tplLayerShell('Katman 5 — Sentez','Profilin Çıkarılıyor', ST.error?'':'<div class="spinner"><span class="sdot"></span>düşünülüyor, bu biraz sürebilir…</div>');
  if(ST.stage===STAGE.DONE)return m.innerHTML=tplReport();
  bindEvents();
}
function renderDots(){
  var idx=STAGE_ORDER.indexOf(ST.stage);
  document.getElementById('dots').innerHTML=STAGE_ORDER.map(function(s,i){
    return '<span class="dot '+((i<=idx&&ST.stage!==STAGE.INTRO)||ST.stage===STAGE.DONE?'on':'')+'"></span>';
  }).join('');
}
function tplIntro(){
  return '<div class="intro"><div class="eyebrow">BEŞ KATMANLI ÖZ-ANALİZ</div>'
    +'<h1 class="intro-title">Kendini, sorulara verdiğin<br>cevaplarla değil, <em>verdiğin tepkilerle</em> tanı.</h1>'
    +'<p class="intro-body">Önce sezgisel senaryolarla gerçek kişilik kalıbın çıkarılacak — itiraf etmekten çekineceğin yanlar dahil. Sonra küçük bir görevle bu profil sınanacak. Çelişki varsa netleştirilecek. En sonda, sistem seni tanıdıktan sonra doğrudan kendine dair sorular soracağız — söylediklerinle çıkan profili karşılaştıracağız.</p>'
    +'<ul><li><b>Katman 1·2</b> — dolaylı sorular ve küçük bir görev, doğrudan "ne seversin" sorulmaz</li>'
    +'<li><b>Katman 3</b> — varsa çelişkiler netleştirilir</li>'
    +'<li><b>Katman 4</b> — artık sona, sana doğrudan 3 soru</li>'
    +'<li><b>Katman 5</b> — kör noktalarını da içeren tam profil + 30/90/365 günlük yol haritası</li></ul>'
    +'<button class="btn primary" onclick="startFlow()">Başla</button>'
    +'<div class="note">~15-20 dakika · sessiz bir yerde, dürüst cevaplarla yapman önerilir · cevapların yalnızca bu cihazda kalır</div></div>';
}
function tplLayerShell(eyebrow,title,inner){
  return '<div class="eyebrow">'+esc(eyebrow)+'</div><h2 class="layer-title">'+esc(title)+'</h2>'
    +(ST.error?'<div class="err">⚠️ '+esc(ST.error)+'<div><button class="btn" onclick="retryCurrent()">Tekrar dene</button></div></div>':'')
    +inner;
}
function tplL1(){
  var h='<div class="progn">Soru '+(ST.core.l1Count+1)+' · en az '+L1_MIN+', en fazla '+L1_MAX+'</div>';
  if(ST.busy&&!ST.curQ)h+='<div class="spinner"><span class="sdot"></span>düşünülüyor…</div>';
  else if(ST.curQ)h+=tplQuestion(ST.curQ,'answerL1');
  h+=tplConfidence();
  return h;
}
function tplQuestion(q,handlerName){
  var h='<div class="card"><p class="q-text">'+esc(q.question)+'</p>';
  if(q.options&&q.options.length>0){
    h+='<div class="opt-list">'+q.options.map(function(o){
      return '<button class="opt-btn" '+(ST.busy?'disabled':'')+' onclick="'+handlerName+'('+JSON.stringify(o).replace(/"/g,'&quot;')+')">'+esc(o)+'</button>';
    }).join('')+'</div>';
  }else{
    h+='<textarea id="freeTxt" placeholder="Aklına ilk geleni yaz…"></textarea>'
      +'<button class="btn primary" '+(ST.busy?'disabled':'')+' onclick="'+handlerName+'(document.getElementById(\'freeTxt\').value)">Devam Et</button>';
  }
  h+='</div>';
  return h;
}
function tplConfidence(){
  var h='<div class="conf-wrap"><div class="conf-lab">Bağlam çekirdeği güven seviyesi</div>';
  DIMENSIONS.forEach(function(d){
    var c=ST.core.dimensions[d];
    h+='<div class="conf-row"><div class="rh"><span>'+esc(d)+'</span><span>'+c.confidence+'%</span></div><div class="conf-bar"><i style="width:'+c.confidence+'%"></i></div></div>';
  });
  h+='</div>';
  return h;
}
function tplL2(){
  if(ST.busy&&!ST.curTask)return '<div class="spinner"><span class="sdot"></span>kişiselleştirilmiş görev hazırlanıyor…</div>';
  if(!ST.curTask)return '';
  var t=ST.curTask;
  return '<div class="card"><div class="task-title">'+esc(t.task_title)+'</div><div class="task-desc">'+esc(t.task_description)+'</div>'
    +'<textarea id="l2Txt" placeholder="Yanıtını buraya yaz…"></textarea>'
    +'<button class="btn primary" '+(ST.busy?'disabled':'')+' onclick="submitL2(document.getElementById(\'l2Txt\').value)">Gönder</button></div>';
}
function tplL3(){
  if(ST.busy&&!ST.curQ)return '<div class="spinner"><span class="sdot"></span>düşünülüyor…</div>';
  if(!ST.curQ)return '';
  return tplQuestion(ST.curQ,'resolveL3');
}
function tplL4(){
  if(ST.confrontQ.length===0)return ST.error?'':'<div class="spinner"><span class="sdot"></span>sana özel sorular hazırlanıyor…</div>';
  var q=ST.confrontQ[ST.confrontIdx];
  return '<div class="card"><div class="qidx">'+(ST.confrontIdx+1)+' / '+ST.confrontQ.length+'</div><p class="q-text">'+esc(q)+'</p>'
    +'<textarea id="cfTxt" placeholder="Dürüstçe yaz…"></textarea>'
    +'<button class="btn primary" '+(ST.busy?'disabled':'')+' onclick="submitConfront(document.getElementById(\'cfTxt\').value)">'+(ST.confrontIdx+1>=ST.confrontQ.length?'Profili Çıkar':'Sıradaki Soru')+'</button></div>';
}
function mdToHtml(md){
  var lines=(md||'').split('\n'),h='',inList=false;
  lines.forEach(function(line){
    var l=line.trim();
    if(/^##\s+/.test(l)){if(inList){h+='</ul>';inList=false;}h+='<h2>'+esc(l.replace(/^##\s+/,''))+'</h2>';return;}
    if(/^#\s+/.test(l)){if(inList){h+='</ul>';inList=false;}h+='<h2>'+esc(l.replace(/^#\s+/,''))+'</h2>';return;}
    if(/^-\s+/.test(l)){if(!inList){h+='<ul>';inList=true;}h+='<li>'+esc(l.replace(/^-\s+/,''))+'</li>';return;}
    if(l==='' ){if(inList){h+='</ul>';inList=false;}return;}
    if(inList){h+='</ul>';inList=false;}
    var bolded=esc(l).replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
    h+='<p>'+bolded+'</p>';
  });
  if(inList)h+='</ul>';
  return h;
}
function tplReport(){
  return '<div class="eyebrow">SENTEZ</div><h2 class="layer-title">Profilin</h2><div class="report">'+mdToHtml(ST.report)+'</div>'
    +'<div class="restart-row"><button class="btn" onclick="restart()">↺ Baştan başla</button></div>';
}
function retryCurrent(){ST.error=null;render();advance(false);}
function bindEvents(){}

render();
</script>
</body>
</html>
